<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About You</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            color: #e0e0e0;
            font-family: 'Press Start 2P', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.15) 2px,
                rgba(0, 0, 0, 0.15) 4px
            );
            z-index: 1000;
        }

        /* CRT vignette */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(
                ellipse at center,
                transparent 60%,
                rgba(0, 0, 0, 0.5) 100%
            );
            z-index: 999;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 12px;
            color: #fff;
            text-shadow:
                0 0 10px #ff00ff,
                0 0 20px #ff00ff,
                0 0 40px #ff00ff,
                0 0 80px #ff00ff;
            animation: flicker 4s infinite;
        }

        .subtitle {
            text-align: center;
            font-size: 0.6rem;
            color: #bbb;
            margin-bottom: 50px;
            line-height: 1.8;
        }

        @keyframes flicker {
            0%, 95%, 100% { opacity: 1; }
            96% { opacity: 0.8; }
            97% { opacity: 1; }
            98% { opacity: 0.7; }
            99% { opacity: 1; }
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .game-card:nth-child(1) { grid-row: 1; grid-column: 1; }
        .game-card:nth-child(3) { grid-row: 1; grid-column: 3; }
        .game-card:nth-child(2) { grid-row: 2; grid-column: 2; }
        .game-card:nth-child(4) { grid-row: 3; grid-column: 1; }
        .game-card:nth-child(5) { grid-row: 3; grid-column: 3; }

        .game-card {
            border: 3px solid #333;
            border-radius: 8px;
            padding: 16px 20px;
            text-align: center;
            position: relative;
            transition: all 0.2s;
            background: linear-gradient(180deg, #12122a 0%, #0a0a18 100%);
        }

        .game-card.playable {
            border-color: #00ffcc;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.15);
        }

        .game-card.playable:hover {
            border-color: #00ffcc;
            box-shadow:
                0 0 15px rgba(0, 255, 204, 0.3),
                0 0 30px rgba(0, 255, 204, 0.15),
                inset 0 0 30px rgba(0, 255, 204, 0.05);
            transform: translateY(-3px);
        }

        .game-card.locked {
            border-color: #222;
            opacity: 0.45;
        }

        .game-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
            display: block;
        }

        .game-title {
            font-size: 0.75rem;
            margin-bottom: 6px;
            line-height: 1.6;
            color: #fff;
        }

        .playable .game-title {
            color: #00ffcc;
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.4);
        }

        .game-status {
            font-size: 0.5rem;
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 6px;
        }

        .status-play {
            color: #0a0a1a;
            background: #00ffcc;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .status-replay {
            color: #0a0a1a;
            background: #ff9933;
            animation: pulse-glow-replay 2s ease-in-out infinite;
        }

        @keyframes pulse-glow-replay {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 153, 51, 0.4); }
            50% { box-shadow: 0 0 15px rgba(255, 153, 51, 0.7); }
        }

        .game-card.played {
            border-color: #ff9933;
            box-shadow: 0 0 15px rgba(255, 153, 51, 0.15);
        }

        .game-card.played:hover {
            border-color: #ff9933;
            box-shadow:
                0 0 15px rgba(255, 153, 51, 0.3),
                0 0 30px rgba(255, 153, 51, 0.15),
                inset 0 0 30px rgba(255, 153, 51, 0.05);
        }

        .played .game-title {
            color: #ff9933;
            text-shadow: 0 0 8px rgba(255, 153, 51, 0.4);
        }

        .status-locked {
            color: #888;
            background: #1a1a2e;
            border: 1px solid #333;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 255, 204, 0.4); }
            50% { box-shadow: 0 0 15px rgba(0, 255, 204, 0.7); }
        }

        .game-card.playable a {
            position: absolute;
            inset: 0;
            text-decoration: none;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            font-size: 0.45rem;
            color: #777;
            line-height: 2;
        }

        .scores-panel {
            margin-top: 40px;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 24px;
            background: linear-gradient(180deg, #12122a 0%, #0a0a18 100%);
        }

        .scores-panel h2 {
            font-size: 0.8rem;
            color: #ff9933;
            text-shadow: 0 0 8px rgba(255, 153, 51, 0.4);
            margin-bottom: 20px;
            text-align: center;
        }

        .scores-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .score-row {
            display: grid;
            grid-template-columns: 2fr 2fr 2fr 1.5fr 1fr;
            align-items: center;
            padding: 0;
            border-bottom: 2px solid #555;
            margin-bottom: 4px;
            font-size: 0.8rem;
        }

        .score-row span {
            padding: 10px 8px;
            border-right: 1px solid #333;
        }

        .score-row span:last-child {
            border-right: none;
        }

        .score-row:last-child {
            border-bottom: none;
        }

        .score-header {
            border-bottom: 2px solid #555;
            background: rgba(255, 255, 255, 0.03);
        }

        .score-header span {
            color: #bbb;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .score-game {
            color: #ccc;
        }

        .score-value {
            color: #00ffcc;
            text-shadow: 0 0 6px rgba(0, 255, 204, 0.3);
        }

        .score-trait {
            color: #ff9933;
            font-size: 0.8rem;
            text-shadow: 0 0 6px rgba(255, 153, 51, 0.3);
        }

        .score-detail {
            color: #aaa;
            font-size: 0.8rem;
        }

        .score-label {
            display: none;
        }

        .scores-empty {
            text-align: center;
            color: #777;
            font-size: 0.45rem;
            padding: 10px 0;
        }

        .coin-insert {
            text-align: center;
            margin-top: 40px;
            font-size: 0.55rem;
            color: #999;
            animation: blink 1.5s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            .subtitle { font-size: 0.5rem; margin-bottom: 30px; }
            .container { padding: 20px 10px; }
            .games-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .game-card { padding: 20px 14px; grid-column: 1 !important; grid-row: auto !important; }
            .game-icon { font-size: 2rem; margin-bottom: 10px; }
            .game-title { font-size: 0.6rem; }
            .game-status { font-size: 0.4rem; }

            .scores-panel { padding: 16px 12px; }
            .scores-panel h2 { font-size: 0.65rem; }

            /* Transpose scores table: hide header, JS adds .score-label elements */
            .score-row.score-header {
                display: none;
            }
            .score-row {
                display: grid;
                grid-template-columns: 10em 1fr;
                gap: 0;
                padding: 0;
                font-size: 0.55rem;
                border: 1px solid #333;
                border-radius: 4px;
                margin-bottom: 20px;
                padding-bottom: 0;
                overflow: hidden;
                border-bottom: 3px solid #555;
            }
            .score-row:last-child { margin-bottom: 0; border-bottom: 1px solid #333; }
            /* Reset all span styles from desktop */
            .score-row span {
                padding: 6px 10px;
                border: none;
                border-bottom: 1px solid #2a2a3e;
                text-align: left !important;
                font-size: 0.55rem;
            }
            /* Labels: left column */
            .score-row .score-label {
                display: block;
                grid-column: 1;
                color: #bbb;
                letter-spacing: 1px;
                border-right: 1px solid #333;
                border-bottom: 1px solid #2a2a3e;
                background: rgba(255, 255, 255, 0.03);
            }
            /* Values: right column */
            .score-row .score-game,
            .score-row .score-detail,
            .score-row .score-trait,
            .score-row .score-value {
                grid-column: 2;
            }
            /* No bottom border on last row */
            .score-row span:last-child,
            .score-row .score-label:nth-last-of-type(1) {
                border-bottom: none;
            }

            .coin-insert { font-size: 0.4rem; margin-top: 30px; }
            .footer { font-size: 0.35rem; margin-top: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ABOUT YOU</h1>
        <p class="subtitle">SELECT A GAME TO PLAY</p>

        <div class="games-grid">
            <!-- Playable: Museum -->
            <div id="museum-card" class="game-card playable">
                <a href="games/museum.html" aria-label="Play Museum"></a>
                <span class="game-icon">🏛️</span>
                <div class="game-title">MUSEUM</div>
                <span class="game-status status-play">&#9654; PLAY</span>
            </div>

            <!-- Coming Soon -->
            <div class="game-card locked">
                <span class="game-icon">🔨</span>
                <div class="game-title">BUILDER</div>
                <span class="game-status status-locked">COMING SOON</span>
            </div>

            <div class="game-card locked">
                <span class="game-icon">🤝</span>
                <div class="game-title">GATHERING</div>
                <span class="game-status status-locked">COMING SOON</span>
            </div>

            <div class="game-card locked">
                <span class="game-icon">⚖️</span>
                <div class="game-title">DILEMMA</div>
                <span class="game-status status-locked">COMING SOON</span>
            </div>

            <div class="game-card locked">
                <span class="game-icon">🌫️</span>
                <div class="game-title">UNCERTAINTY</div>
                <span class="game-status status-locked">COMING SOON</span>
            </div>
        </div>

        <div id="scores-panel" class="scores-panel" style="display: none;">
            <h2>TEST RESULTS</h2>
            <ul id="scores-list" class="scores-list">
                <li class="score-row score-header">
                    <span>GAME</span>
                    <span>METHOD</span>
                    <span>PROGRESS</span>
                    <span>BIG 5 TRAIT</span>
                    <span style="text-align:right">SCORE</span>
                </li>
            </ul>
        </div>

        <p class="coin-insert">INSERT COIN TO CONTINUE</p>

        <div class="footer">
            <p>&copy; 2026 ABOUT YOU &mdash; ALL RIGHTS RESERVED</p>
            <button id="reset-session-btn" style="
                margin-top: 16px;
                padding: 6px 16px;
                font-family: 'Press Start 2P', monospace;
                font-size: 0.4rem;
                color: #666;
                background: transparent;
                border: 1px solid #333;
                border-radius: 4px;
                cursor: pointer;
            " onmouseover="this.style.color='#ff4444';this.style.borderColor='#ff4444'"
               onmouseout="this.style.color='#666';this.style.borderColor='#333'">
                RESET SESSION
            </button>
        </div>
    </div>
    <script>
        // Check which games have been played this session
        if (sessionStorage.getItem('museum_played')) {
            const card = document.getElementById('museum-card');
            if (card) {
                card.classList.remove('playable');
                card.classList.add('playable', 'played');
                const status = card.querySelector('.game-status');
                status.className = 'game-status status-replay';
                status.innerHTML = '&#9654; PLAY AGAIN';
            }
        }

        // Build scores panel from session results
        const scoresList = document.getElementById('scores-list');
        const scoresPanel = document.getElementById('scores-panel');
        let hasScores = false;

        // Museum
        const museumRaw = sessionStorage.getItem('museum_results');
        if (museumRaw) {
            try {
                const m = JSON.parse(museumRaw);
                const method = m.completionMethod === 'trip' ? 'PSYCHEDELIC PORTAL'
                    : m.completionMethod === 'sober' ? 'FULL TOUR'
                    : 'EARLY EXIT';
                const pct = Math.round(m.abstractnessLevel * 100);
                const row = document.createElement('li');
                row.className = 'score-row';
                row.innerHTML = `
                    <span class="score-game" data-label="GAME">🏛️ MUSEUM</span>
                    <span class="score-detail" data-label="METHOD">${method}</span>
                    <span class="score-detail" data-label="PROGRESS">${m.uniqueDescriptions}/${m.totalArt || '?'} FOUND</span>
                    <span class="score-trait" data-label="TRAIT">OPENNESS</span>
                    <span class="score-value" data-label="SCORE" style="text-align:right">${pct}%</span>
                `;
                scoresList.appendChild(row);
                hasScores = true;
            } catch(e) {}
        }

        // (Future games would add rows here)

        if (hasScores) {
            scoresPanel.style.display = '';

            // Always insert label cells (hidden on desktop via CSS, shown on mobile)
            document.querySelectorAll('.score-row:not(.score-header)').forEach(row => {
                const spans = Array.from(row.querySelectorAll('span'));
                spans.forEach(span => {
                    const label = span.getAttribute('data-label');
                    if (label) {
                        const labelEl = document.createElement('span');
                        labelEl.className = 'score-label';
                        labelEl.textContent = label;
                        row.insertBefore(labelEl, span);
                    }
                });
            });
        }

        // Reset session button
        document.getElementById('reset-session-btn').addEventListener('click', function() {
            sessionStorage.clear();
            location.reload();
        });
    </script>
</body>
</html>
